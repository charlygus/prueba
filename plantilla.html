<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurar Horario Maestro - CSE</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --c-master: #065f46; --c-sec: #10b981; --bg-body: #f0fdf4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; }
        .container-cse { width: 95%; max-width: 1600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(6,95,70,0.08); }
        /* Logo centrado */
        .web-brand { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; text-align: center; }
        .web-logo-img { height: 70px; object-fit: contain; margin: 0 auto; }
        .brand-line { height: 5px; width: 80px; margin: 10px auto 0; background: linear-gradient(90deg, var(--c-master), var(--c-sec), #fa65c3); border-radius: 10px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .day-selector { padding: 8px 25px; border: 2px solid #d1fae5; border-radius: 50px; font-weight: 700; color: var(--c-master); outline: none; cursor: pointer; }
        .day-header { text-align: center; margin-bottom: 15px; }
        .day-title { color: var(--c-master); font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .tables-wrapper { display: flex; gap: 20px; }
        .table-block { flex: 1; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #d1fae5; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--c-master); color: white; font-weight: 700; text-transform: uppercase; padding: 10px 2px; font-size: 12px; }
        td { border-bottom: 1px solid #ecfdf5; border-right: 1px solid #ecfdf5; padding: 6px; text-align: center; font-size: 11.5px; height: 48px; cursor: pointer; }
        td:hover { background-color: #f0fdf4; }
        .col-hora { width: 50px; font-weight: 800; color: var(--c-master); background: #fafafa; }
        /* pointer-events: none para que el clic pase al fondo */
        .name-tag { pointer-events: none; display: inline-block; padding: 3px 8px; border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 10px; color: var(--c-master); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
        @media print { .no-print { display: none !important; } .container-cse { box-shadow: none; border: none; width: 100%; } table { border: 1px solid #000; } th, td { border: 1px solid #000 !important; color: #000 !important; } .name-tag { background: none !important; border: none !important; font-size: 14px !important; } }
    </style>
</head>
<body>
<div class="container-cse">
    <header class="no-print">
        <div class="flex items-center gap-3">
            <span class="font-bold text-emerald-800 text-sm">PLANTILLA FIJA:</span>
            <select id="diaSelector" class="day-selector">
                <option value="1">LUNES</option><option value="2">MARTES</option><option value="3">MIÉRCOLES</option><option value="4">JUEVES</option><option value="5">VIERNES</option>
            </select>
        </div>
        <button class="bg-emerald-700 text-white px-6 py-2 rounded-full font-bold text-xs" onclick="window.print()">IMPRIMIR MAESTRO</button>
    </header>
    <div class="web-brand no-print">
        <img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" class="web-logo-img">
        <div class="brand-line"></div>
    </div>
    <div class="day-header"><h2 class="day-title" id="txtDia">LUNES (MAESTRO)</h2><div class="text-emerald-600 font-bold text-xs uppercase">Horario Base Semanal</div></div>
    <div class="tables-wrapper">
        <div class="table-block"><div id="cont-apoyo"></div></div>
        <div class="table-block"><div id="cont-ingles"></div></div>
    </div>
</div>
<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 no-print">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl border-t-8 border-emerald-600">
        <h3 id="modalTit" class="text-xl font-bold mb-1"></h3>
        <p class="text-xs text-slate-500 mb-4">Escribe los alumnos fijos de esta hora separados por comas.</p>
        <textarea id="modalInput" rows="5" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-emerald-500 font-bold uppercase"></textarea>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="cerrarModal()" class="px-4 py-2 font-bold text-slate-400 uppercase text-xs">Cancelar</button>
            <button id="btnSave" onclick="guardar()" class="px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold shadow-lg text-xs">GUARDAR EN PLANTILLA</button>
        </div>
    </div>
</div>
<script>
    const supabaseUrl = 'https://gwqmtvnekjdladdzbhkg.supabase.co';
    const supabaseKey = 'sb_publishable_SHrC9fPY6flCKKOEygV7TQ_PTKY1N96';
    const miSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const horas = ['15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];
    let datosMaestros = [];
    let celdaActiva = {};
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('diaSelector').onchange = cargar; cargar(); });
    async function cargar() {
        const d = document.getElementById('diaSelector').value;
        const n = ["","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES"];
        document.getElementById('txtDia').innerText = n[d] + " (MAESTRO)";
        renderGridVacia();
        const { data } = await miSupabase.from('horario_maestro').select('*').eq('dia_semana', d);
        datosMaestros = data || [];
        renderGrid();
    }
    function renderGridVacia() {
        const h = `<thead><tr><th style="width:50px">H</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>`;
        let r = ''; horas.forEach(hr => r += `<tr><td class="col-hora">${hr}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`);
        document.getElementById('cont-apoyo').innerHTML = `<table>${h}<tbody>${r}</tbody></table>`;
        document.getElementById('cont-ingles').innerHTML = `<table>${h}<tbody>${r}</tbody></table>`;
    }
    function renderGrid() {
        ['Apoyo','Ingles'].forEach(m => {
            let html = `<thead><tr><th class="col-hora">H</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead><tbody>`;
            horas.forEach(h => {
                const reg = datosMaestros.find(x => x.hora === h && x.mesa === m);
                const txt = reg ? reg.alumnos : '';
                const arr = txt ? txt.split(',').map(s=>s.trim()).filter(s=>s) : [];
                html += `<tr onclick="abrirModal('${h}','${m}')"><td class="col-hora">${h}</td>`;
                for(let i=0; i<6; i++) html += `<td>${arr[i]?`<span class="name-tag">${arr[i]}</span>`:''}</td>`;
                html += `</tr>`;
            });
            document.getElementById(`cont-${m.toLowerCase()}`).innerHTML = `<table>${html}</tbody></table>`;
        });
    }
    function abrirModal(h, m) {
        const reg = datosMaestros.find(x => x.hora === h && x.mesa === m);
        celdaActiva = { h, m, id: reg?reg.id:null };
        document.getElementById('modalTit').innerText = m + " - " + h;
        document.getElementById('modalInput').value = reg ? reg.alumnos : '';
        document.getElementById('modal').classList.replace('hidden', 'flex');
        document.getElementById('modalInput').focus();
    }
    function cerrarModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
    async function guardar() {
        const val = document.getElementById('modalInput').value.trim();
        const { h, m, id } = celdaActiva;
        const d = document.getElementById('diaSelector').value;
        document.getElementById('btnSave').innerText = "GUARDANDO...";
        if(id) await miSupabase.from('horario_maestro').update({alumnos: val}).eq('id', id);
        else if(val) await miSupabase.from('horario_maestro').insert([{dia_semana:d, hora:h, mesa:m, alumnos:val}]);
        cerrarModal(); document.getElementById('btnSave').innerText = "GUARDAR EN PLANTILLA"; cargar();
    }
</script>
</body>
</html>
