<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-900 mb-6">Gestor de Horarios Inteligente</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Añadir Nuevo Alumno</h2>
                <div class="space-y-4">
                    <input type="text" id="nombreAlumno" placeholder="Nombre completo" class="w-full p-2 border rounded">
                    <input type="text" id="telefonoAlumno" placeholder="Teléfono" class="w-full p-2 border rounded">
                    <select id="mesaAlumno" class="w-full p-2 border rounded">
                        <option value="Apoyo">Mesa de Apoyo (Máx 6)</option>
                        <option value="Ingles">Mesa de Inglés</option>
                    </select>
                    <button onclick="añadirAlumno()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Guardar Alumno</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Acciones de Hoy</h2>
                <p class="text-gray-600 text-sm mb-4">Registra faltas o recuperaciones sin alterar tu horario maestro semanal.</p>
                <div class="space-y-2">
                    <button onclick="alert('Función de marcar falta en desarrollo para el siguiente módulo')" class="w-full bg-red-100 text-red-700 p-3 rounded font-medium hover:bg-red-200 text-left border border-red-300">
                        + Registrar Falta de un Alumno (Añade a bolsa de horas)
                    </button>
                    <button onclick="alert('Función de clase extra en desarrollo para el siguiente módulo')" class="w-full bg-green-100 text-green-700 p-3 rounded font-medium hover:bg-green-200 text-left border border-green-300">
                        + Añadir Recuperación / Clase Extra hoy
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Listado de Alumnos y Bolsa de Horas</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-3">Nombre</th>
                            <th class="p-3">Mesa Base</th>
                            <th class="p-3 text-center">Teléfono</th>
                            <th class="p-3 text-center">Clases a Recuperar</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAlumnos" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === CONEXIÓN A TU BASE DE DATOS SUPABASE ===
        const supabaseUrl = 'https://gwqmtvnekjdladdzbhkg.supabase.co';
        const supabaseKey = 'sb_publishable_SHrC9fPY6flCKKOEygV7TQ_PTKY1N96';
        
        // Inicializamos la conexión
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Función para leer los alumnos de la base de datos
        async function cargarAlumnos() {
            const { data: alumnos, error } = await supabase
                .from('alumnos')
                .select('*');

            if (error) {
                console.error("Error al cargar:", error);
                return;
            }

            const tbody = document.getElementById('tablaAlumnos');
            tbody.innerHTML = ''; // Limpiamos tabla antes de cargar

            alumnos.forEach(alumno => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                
                // Color para la bolsa de horas (rojo si debe recuperar clases)
                const colorBolsa = alumno.clases_pendientes > 0 ? 'text-red-600 font-bold' : 'text-gray-500';

                tr.innerHTML = `
                    <td class="p-3 font-medium">${alumno.nombre}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 bg-gray-200 rounded-full text-xs">${alumno.mesa_predeterminada}</span>
                    </td>
                    <td class="p-3 text-center text-gray-600">${alumno.telefono || '-'}</td>
                    <td class="p-3 text-center ${colorBolsa}">${alumno.clases_pendientes}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Función para guardar un alumno nuevo
        async function añadirAlumno() {
            const nombre = document.getElementById('nombreAlumno').value;
            const telefono = document.getElementById('telefonoAlumno').value;
            const mesa = document.getElementById('mesaAlumno').value;

            if (!nombre) {
                alert("El nombre es obligatorio");
                return;
            }

            const { data, error } = await supabase
                .from('alumnos')
                .insert([
                    { nombre: nombre, telefono: telefono, mesa_predeterminada: mesa }
                ]);

            if (error) {
                alert("Hubo un error al guardar");
                console.error(error);
            } else {
                // Limpiamos formulario y recargamos la tabla
                document.getElementById('nombreAlumno').value = '';
                document.getElementById('telefonoAlumno').value = '';
                cargarAlumnos(); 
            }
        }

        // Cargar los alumnos nada más abrir el archivo
        cargarAlumnos();
    </script>
</body>
</html>
