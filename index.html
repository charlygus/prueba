<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horario Diario CSE</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --c-primary: #243c7a; --c-sec: #2b94cc; --bg-body: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; }
        .container-cse { width: 95%; max-width: 1600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(36,60,122,0.08); }
        
        /* LOGO CENTRADO */
        .web-brand { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .web-logo-img { height: 70px; object-fit: contain; }
        .brand-line { height: 5px; width: 80px; margin: 10px auto 0; background: linear-gradient(90deg, var(--c-primary), var(--c-sec), #fa65c3); border-radius: 10px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .date-selector { padding: 8px 15px; border: 2px solid #e1e9f0; border-radius: 50px; font-weight: 700; color: var(--c-primary); outline: none; }
        .day-header { text-align: center; margin-bottom: 15px; }
        .day-title { color: var(--c-primary); font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .tables-wrapper { display: flex; gap: 20px; }
        .table-block { flex: 1; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #dce1e6; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--c-primary); color: white; font-weight: 700; text-transform: uppercase; padding: 10px 2px; font-size: 12px; }
        td { border-bottom: 1px solid #eee; border-right: 1px solid #eee; padding: 6px; text-align: center; font-size: 11.5px; height: 48px; cursor: pointer; }
        td:hover { background-color: #f8fafc; }
        .col-hora { width: 50px; font-weight: 800; color: var(--c-primary); background: #fafafa; }
        
        /* FIX CLIC: EL NOMBRE NO BLOQUEA EL CLIC */
        .name-tag { pointer-events: none; display: inline-block; padding: 3px 8px; border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 10px; color: var(--c-primary); background: rgba(43,148,204,0.1); border: 1px solid rgba(43,148,204,0.3); }
        .tag-modificado { background: #fff3cd; color: #856404; border-color: #ffeeba; }

        .print-only-notes { display: none; }

        /* IMPRESIÓN CALCADA */
        @media print {
            @page { size: A4 landscape; margin: 5mm; } 
            body { background: white !important; margin: 0; padding: 0; display: grid !important; grid-template-columns: 58% 40% !important; column-gap: 15px; height: 100vh; width: 100%; overflow: hidden; zoom: 65%; }
            .no-print { display: none !important; }
            .container-cse { grid-column: 1; width: 100% !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; display: block !important; }
            .tables-wrapper { display: flex !important; flex-direction: column !important; gap: 5px !important; }
            .table-block { width: 100% !important; border: 1px solid #000 !important; border-radius: 0 !important; }
            table { border: 1px solid #000 !important; width: 100% !important; }
            th, td { border: 1px solid #000 !important; color: black !important; padding: 1px !important; }
            .name-tag { background: transparent !important; color: black !important; border: none !important; padding: 0 !important; font-weight: 900 !important; font-size: 15px !important; }
            .print-only-notes { grid-column: 2; display: block !important; border: 2px solid #000; padding: 15px; height: 98%; box-sizing: border-box; }
            .notes-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
<div class="container-cse">
    <header class="no-print">
        <div class="flex items-center gap-3">
            <button class="bg-blue-800 text-white px-6 py-2 rounded-full font-bold text-xs" onclick="window.print()">IMPRIMIR HOJA</button>
            <input type="date" id="fechaSelector" class="date-selector">
        </div>
        <div id="reloj" class="font-bold text-blue-900 text-xl">00:00:00</div>
    </header>
    <div class="web-brand no-print">
        <img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" class="web-logo-img">
        <div class="brand-line"></div>
    </div>
    <div class="day-header"><h2 class="day-title" id="txtDia">LUNES</h2><div class="text-blue-500 font-bold text-xs">GESTIÓN DIARIA</div></div>
    <div class="tables-wrapper">
        <div class="table-block"><div id="cont-apoyo"></div></div>
        <div class="table-block"><div id="cont-ingles"></div></div>
    </div>
    <div class="mt-6 no-print p-4 bg-slate-50 rounded-xl border border-slate-200">
        <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">Historial de cambios hoy</h3>
        <ul id="listaHistorial" class="text-[11px] font-mono text-slate-600 space-y-1"></ul>
    </div>
</div>
<div class="print-only-notes">
    <div class="notes-header"><h2 style="font-size:24px; font-weight:900;">NOTAS</h2><img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" style="height:40px"></div>
</div>
<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 no-print">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl border-t-8 border-blue-600">
        <h3 id="modalTit" class="text-xl font-bold mb-1"></h3>
        <p class="text-xs text-slate-500 mb-4">Modifica los alumnos para hoy. No afecta a la plantilla semanal.</p>
        <textarea id="modalInput" rows="5" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 font-bold uppercase"></textarea>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="cerrarModal()" class="px-4 py-2 font-bold text-slate-400 uppercase text-xs">Cancelar</button>
            <button id="btnSave" onclick="guardar()" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg text-xs">GUARDAR CAMBIOS</button>
        </div>
    </div>
</div>
<script>
    const supabaseUrl = 'https://gwqmtvnekjdladdzbhkg.supabase.co';
    const supabaseKey = 'sb_publishable_SHrC9fPY6flCKKOEygV7TQ_PTKY1N96';
    const miSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const horas = ['15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];
    const diasSem = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
    let datosM = [], datosD = [], celdaActiva = {};
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('fechaSelector').value = new Date().toISOString().split('T')[0]; document.getElementById('fechaSelector').onchange = cargar; cargar(); });
    async function cargar() {
        const f = document.getElementById('fechaSelector').value;
        const fObj = new Date(f);
        document.getElementById('txtDia').innerText = diasSem[fObj.getDay()];
        renderGridVacia();
        const { data: m } = await miSupabase.from('horario_maestro').select('*').eq('dia_semana', fObj.getDay()||7);
        datosM = m || [];
        const { data: d } = await miSupabase.from('modificaciones_diarias').select('*').eq('fecha', f);
        datosD = d || [];
        renderGrid(); cargarHistorial(f);
    }
    function renderGridVacia() {
        const h = `<thead><tr><th style="width:50px">H</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>`;
        let r = ''; horas.forEach(hr => r += `<tr><td class="col-hora">${hr}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`);
        document.getElementById('cont-apoyo').innerHTML = `<table>${h}<tbody>${r}</tbody></table>`;
        document.getElementById('cont-ingles').innerHTML = `<table>${h}<tbody>${r}</tbody></table>`;
    }
    function renderGrid() {
        ['Apoyo','Ingles'].forEach(m => {
            let html = `<thead><tr><th class="col-hora">H</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead><tbody>`;
            horas.forEach(h => {
                const ex = datosD.find(x => x.hora === h && x.mesa === m);
                const ms = datosM.find(x => x.hora === h && x.mesa === m);
                const txt = ex ? ex.alumnos : (ms ? ms.alumnos : '');
                const arr = txt ? txt.split(',').map(s=>s.trim()).filter(s=>s) : [];
                html += `<tr onclick="abrirModal('${h}','${m}')"><td class="col-hora">${h}</td>`;
                for(let i=0; i<6; i++) html += `<td>${arr[i]?`<span class="name-tag ${ex?'tag-modificado':''}">${arr[i]}</span>`:''}</td>`;
                html += `</tr>`;
            });
            document.getElementById(`cont-${m.toLowerCase()}`).innerHTML = `<table>${html}</tbody></table>`;
        });
    }
    function abrirModal(h, m) {
        const ex = datosD.find(x => x.hora === h && x.mesa === m);
        const ms = datosM.find(x => x.hora === h && x.mesa === m);
        celdaActiva = { h, m, original: (ex ? ex.alumnos : (ms ? ms.alumnos : '')) };
        document.getElementById('modalTit').innerText = m + " - " + h;
        document.getElementById('modalInput').value = celdaActiva.original;
        document.getElementById('modal').classList.replace('hidden', 'flex');
        document.getElementById('modalInput').focus();
    }
    function cerrarModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
    async function guardar() {
        const val = document.getElementById('modalInput').value.trim();
        const { h, m, original } = celdaActiva;
        const f = document.getElementById('fechaSelector').value;
        if(val === original) return cerrarModal();
        const ex = datosD.find(x => x.hora === h && x.mesa === m);
        if(ex) await miSupabase.from('modificaciones_diarias').update({alumnos: val}).eq('id', ex.id);
        else await miSupabase.from('modificaciones_diarias').insert([{fecha:f, hora:h, mesa:m, alumnos:val}]);
        await miSupabase.from('historial_movimientos').insert([{fecha_afectada:f, accion:`[${h}-${m}] ${original||'Vacío'} -> ${val||'Vacío'}`}]);
        cerrarModal(); cargar();
    }
    async function cargarHistorial(f) {
        const { data } = await miSupabase.from('historial_movimientos').select('*').eq('fecha_afectada', f).order('fecha_registro', { ascending: false });
        document.getElementById('listaHistorial').innerHTML = data?.map(h => `<li>• ${new Date(h.fecha_registro).toLocaleTimeString()} - ${h.accion}</li>`).join('') || 'Sin cambios';
    }
</script>
</body>
</html>
